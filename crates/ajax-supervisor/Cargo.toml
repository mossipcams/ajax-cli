[package]
name = "ajax-supervisor"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[lib]
name = "ajax_supervisor"
path = "src/lib.rs"

[dependencies]
ajax-core = { path = "../ajax-core" }
notify = "8"
serde_json = "1.0"
tokio = { version = "1", features = ["process", "io-util", "macros", "rt", "rt-multi-thread", "sync", "time"] }
