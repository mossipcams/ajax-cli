[package]
name = "ajax-cli"
version = "0.2.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[lints]
workspace = true

[features]
default = ["interactive", "supervisor"]
interactive = ["dep:ajax-tui", "dep:nix"]
supervisor = ["dep:ajax-supervisor", "dep:tokio"]

[[bin]]
name = "ajax-cli"
path = "src/main.rs"

[dependencies]
ajax-core = { workspace = true }
ajax-supervisor = { workspace = true, optional = true }
ajax-tui = { workspace = true, optional = true }
ajax-web = { workspace = true }
clap = { workspace = true }
nix = { workspace = true, optional = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "net", "time"], optional = true }
