[package]
name = "ajax-cli"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
name = "ajax"
path = "src/main.rs"

[dependencies]
ajax-core = { path = "../ajax-core" }
ajax-supervisor = { path = "../ajax-supervisor" }
ajax-tui = { path = "../ajax-tui" }
clap = "4.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["rt-multi-thread"] }
