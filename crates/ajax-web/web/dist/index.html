<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
  <meta name="color-scheme" content="dark">
  <title>Ajax Cockpit</title>
  <meta name="theme-color" content="#161616">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Ajax Cockpit">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="ajax-app-version" content="__AJAX_APP_VERSION__">
  <!-- Paint dark before /app.css arrives; iOS PWA splash is already #161616. -->
  <style id="ajax-boot-paint">html,body,#app{background:#161616;color:#e6e6e6;margin:0;min-height:100%}</style>
  <script type="module" crossorigin src="/app.js"></script>
  <link rel="stylesheet" crossorigin href="/app.css">
</head>
<body>
  <div id="app"></div>
</body>
</html>
