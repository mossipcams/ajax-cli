<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Ajax Cockpit</title>
  <meta name="theme-color" content="#1F1A17">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ajax">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <div id="result-panel" class="result-panel" role="status" aria-live="polite" hidden>
    <p id="result-message" class="result-message"></p>
    <pre id="result-output" class="result-output" hidden></pre>
    <button id="result-dismiss" type="button" class="pill">Dismiss</button>
  </div>

  <header>
    <div class="bar">
      <h1>Ajax</h1>
      <p id="status-line" class="status-line" aria-live="polite">— loading</p>
      <span class="live-dot" aria-hidden="true"></span>
    </div>
  </header>

  <main>
    <nav id="project-nav" class="project-nav" aria-label="Projects" hidden></nav>

    <button id="alerts-banner" class="alerts-banner" type="button" hidden></button>

    <button id="new-task-row" class="new-task-row" type="button">
      <span class="new-task-glyph" aria-hidden="true">+</span>
      <span id="new-task-row-label" class="new-task-label">New task</span>
    </button>

    <section id="inbox" class="group" aria-live="polite"></section>
    <section id="repos" class="group" aria-live="polite"></section>
    <p id="empty-state" class="empty" hidden>All quiet</p>

    <section id="task-detail" aria-live="polite"></section>
  </main>

  <div id="new-task-sheet" role="dialog" aria-modal="true" aria-labelledby="new-task-title">
    <form id="new-task-form" class="sheet-card" autocomplete="off">
      <h2 id="new-task-title">New task</h2>
      <label for="new-task-repo">Repository</label>
      <select id="new-task-repo" name="repo" required></select>
      <label for="new-task-title-input">Title</label>
      <input id="new-task-title-input" name="title" type="text" required maxlength="80" placeholder="Short title">
      <label for="new-task-agent">Agent</label>
      <select id="new-task-agent" name="agent">
        <option value="codex">Codex</option>
        <option value="claude">Claude</option>
        <option value="cursor">Cursor</option>
      </select>
      <p id="new-task-error" class="sheet-error" hidden></p>
      <div class="sheet-actions">
        <button type="button" class="pill" data-sheet-cancel>Cancel</button>
        <button type="submit" class="pill is-primary">Start</button>
      </div>
    </form>
  </div>

  <script src="/app.js" defer></script>
</body>
</html>
