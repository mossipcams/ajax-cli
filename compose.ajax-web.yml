services:
  ajax-web-dev:
    build:
      context: .
      dockerfile: Dockerfile.ajax-web
    image: ajax-web-dev:local
    restart: unless-stopped
    environment:
      - AJAX_WEB_CHOWN_STATE=0
      - AJAX_WEB_SNAPSHOT_ONLY=1
    ports:
      - "8788:8788"
    volumes:
      - "${HOME}/.ajax-dev:/ajax-dev"
