services:
  ajax-web-dev:
    build:
      context: .
      dockerfile: Dockerfile.ajax-web
    image: ajax-web-dev:local
    restart: unless-stopped
    environment:
      - AJAX_WEB_CHOWN_STATE=0
    ports:
      - "8788:8788"
    volumes:
      - "${HOME}/.ajax-dev:/ajax-dev"
      - "${HOME}/Desktop/Projects:/Users/matt/Desktop/Projects"
      - "${HOME}/.ajax-dev/worktrees:/Users/matt/.ajax-dev/worktrees"
