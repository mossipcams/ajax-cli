name: Release Please

"on":
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest

    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # The "simple" release type bumps crates/ajax-cli/Cargo.toml but does not
      # touch Cargo.lock, so the open release PR would fail the `--locked` CI
      # checks. Re-lock the workspace member version on the release PR branch
      # and push it back. `cargo update --workspace` only re-locks workspace
      # members (a one-line change for ajax-cli), leaving dependencies pinned.
      # headBranchName comes from release-please's own PR output (a branch name
      # it generates), not from untrusted event data.
      - name: Check out release PR branch
        if: ${{ steps.release.outputs.pr }}
        uses: actions/checkout@v4
        with:
          ref: ${{ fromJSON(steps.release.outputs.pr).headBranchName }}
          token: ${{ github.token }}

      - name: Sync Cargo.lock with bumped version
        if: ${{ steps.release.outputs.pr }}
        run: |
          cargo update --workspace
          if ! git diff --quiet Cargo.lock; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Cargo.lock
            git commit -m "chore: sync Cargo.lock for release"
            git push
          fi
