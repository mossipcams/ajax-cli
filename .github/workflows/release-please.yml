name: Release Please

"on":
  push:
    branches:
      - main
  workflow_dispatch:

# Two merges landing on main close together would otherwise run two release-please
# instances against the same rolling PR and race on its branch. Serialise instead
# of cancelling: a cancelled run can leave the release branch half-updated.
concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest

    steps:
      # RELEASE_PLEASE_TOKEN is required, not merely preferred: `CI` is a
      # required status check on main, and a PR opened with the default
      # GITHUB_TOKEN does not trigger workflow runs. The release PR would then
      # never report `CI` and could never be merged.
      - name: Resolve release token
        id: token
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [ -n "$RELEASE_PLEASE_TOKEN" ]; then
            echo "token=${RELEASE_PLEASE_TOKEN}" >> "$GITHUB_OUTPUT"
          else
            echo "token=${GITHUB_TOKEN}" >> "$GITHUB_OUTPUT"
            echo "::warning title=Missing RELEASE_PLEASE_TOKEN::Falling back to github.token. PRs it creates do not trigger CI, so the required 'CI' check will never appear and the release PR will be unmergeable."
          fi

      # Cargo.lock is bumped in-place by the config's extra-files entry, so the
      # release PR reaches its final SHA in one update — no follow-up lock
      # commit, and therefore no second round of checks to supersede.
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
