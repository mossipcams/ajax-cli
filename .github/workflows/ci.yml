name: CI

# No `push: main` trigger. The `CI` ruleset on main requires the aggregate `CI`
# check with `strict_required_status_checks_policy: true`, so a PR cannot merge
# unless its head is already up to date with main and that exact tree passed the
# full suite. Re-running everything on the merge commit tested nothing new.
"on":
  pull_request:
  merge_group:
  workflow_dispatch:

# One run per PR head. A superseded push (including a Release Please force-push
# that regenerates the release branch) cancels its predecessor. Merge queue runs
# are never cancelled: the queue is already serialising exact merge candidates.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  pr-title:
    name: PR Title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Validate PR title
        if: github.event_name == 'pull_request'
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Types that release-please changelog-sections recognize, plus chore
          # for release-please PRs (pull-request-title-pattern).
          types: |
            feat
            fix
            perf
            refactor
            revert
            chore
      - name: Skip on non-PR events
        if: github.event_name != 'pull_request'
        run: echo "PR title check not applicable for ${{ github.event_name }}."

  # The generated Release Please PR contains no source changes: every commit it
  # releases already passed the full suite on its own PR. It gets this one cheap
  # job instead — the checks that are actually specific to a release candidate.
  release-candidate:
    name: Release Candidate
    runs-on: ubuntu-latest
    needs: pr-title
    if: ${{ startsWith(github.head_ref, 'release-please--branches--main') }}

    steps:
      - name: Checkout release PR head
        uses: actions/checkout@v4
        with:
          # The exact head SHA, not the ephemeral pull/N/merge ref, so the job
          # verifies the commit that will be merged.
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch current main
        run: git fetch --no-tags origin main:refs/remotes/origin/main

      # GitHub's native mergeability already blocks a conflicted PR, but it
      # reports it as an unexplained "can't merge" banner. This turns the same
      # state into a failing check with the conflicting paths in the log.
      - name: Detect merge conflicts with main
        run: |
          set -uo pipefail
          conflicts=$(git merge-tree --write-tree origin/main HEAD)
          status=$?

          if [ "$status" -eq 0 ]; then
            echo "Release PR merges cleanly into origin/main."
            exit 0
          fi

          if [ "$status" -gt 1 ]; then
            echo "::error title=merge-tree failed::git merge-tree exited $status"
            printf '%s\n' "$conflicts"
            exit "$status"
          fi

          echo "::error title=Release PR conflicts with main::Re-run the Release Please workflow to regenerate this branch from current main."
          printf '%s\n' "$conflicts"
          exit 1

      - name: Check release version consistency
        run: node scripts/check-release-version.mjs

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci

      # Proves Cargo.lock records the bumped version: `--locked` fails if the
      # lockfile would need to change.
      - name: Cargo check
        run: cargo check --locked -p ajax-cli

  format:
    name: Format
    runs-on: ubuntu-latest
    needs: pr-title
    if: ${{ !startsWith(github.head_ref, 'release-please--branches--main') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci

      - name: Check formatting
        run: cargo fmt --check

  web:
    name: Web
    runs-on: ubuntu-latest
    needs: pr-title
    if: ${{ !startsWith(github.head_ref, 'release-please--branches--main') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      # Same command husky runs at the tail of `npm run verify`: workflow
      # invariants, release-version consistency, and the script tests.
      - name: Verify CI and release pipeline invariants
        run: npm run ci:verify

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps webkit

      - name: Smoke and visual-regression tests
        run: npm run web:smoke -- --project=mobile-webkit

  check:
    name: Cargo Check
    runs-on: ubuntu-latest
    needs: pr-title
    if: ${{ !startsWith(github.head_ref, 'release-please--branches--main') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci

      - name: Check all targets
        run: cargo check --locked --all-targets --all-features
        env:
          RUSTFLAGS: -D warnings

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: pr-title
    if: ${{ !startsWith(github.head_ref, 'release-please--branches--main') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Nextest and Doc Tests
    runs-on: ubuntu-latest
    needs: pr-title
    if: ${{ !startsWith(github.head_ref, 'release-please--branches--main') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Test
        run: cargo nextest run --all-features --test-threads=1

      - name: Doc tests
        run: cargo test --doc

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    needs: pr-title
    if: ${{ !startsWith(github.head_ref, 'release-please--branches--main') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci

      - name: Documentation
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    needs: pr-title
    if: ${{ !startsWith(github.head_ref, 'release-please--branches--main') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Audit dependencies
        run: cargo audit

  # The single required status check. Exactly one of the two paths must be
  # green: the full suite on a normal PR, or release-candidate on a Release
  # Please PR.
  ci:
    name: CI
    runs-on: ubuntu-latest
    needs:
      - pr-title
      - release-candidate
      - format
      - check
      - clippy
      - test
      - docs
      - audit
      - web
    if: ${{ always() }}

    steps:
      - name: Verify required checks
        run: |
          set -euo pipefail

          if [[ "${{ needs.pr-title.result }}" != "success" ]]; then
            echo "PR title check did not pass (${{ needs.pr-title.result }})."
            exit 1
          fi

          if [[ "${{ startsWith(github.head_ref, 'release-please--branches--main') }}" == "true" ]]; then
            if [[ "${{ needs.release-candidate.result }}" != "success" ]]; then
              echo "Release candidate check did not pass (${{ needs.release-candidate.result }})."
              exit 1
            fi
            echo "Release PR: release-candidate passed. The full suite is not re-run because every released commit already passed it on its own PR."
            exit 0
          fi

          for result in \
            "${{ needs.format.result }}" \
            "${{ needs.web.result }}" \
            "${{ needs.check.result }}" \
            "${{ needs.clippy.result }}" \
            "${{ needs.test.result }}" \
            "${{ needs.docs.result }}" \
            "${{ needs.audit.result }}"
          do
            if [[ "$result" != "success" ]]; then
              echo "A required CI job did not pass (result: $result)."
              exit 1
            fi
          done

          echo "All required CI jobs passed."
