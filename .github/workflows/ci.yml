name: CI

"on":
  pull_request:
  merge_group:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  format-and-duplication:
    name: Format and Duplication
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check

      - name: Check duplication
        run: npm run lint:duplication

  web:
    name: Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Check frontend contracts
        run: npm run verify:web-contract-gate

      - name: Check Svelte and TypeScript
        run: npm run web:check

      - name: Test frontend
        run: npm run web:test -- --run

  check:
    name: Cargo Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Check all targets
        run: cargo check --all-targets --all-features

      - name: Check warnings
        run: cargo check --all-targets --all-features
        env:
          RUSTFLAGS: -D warnings

      - name: Check no default features
        run: cargo check --no-default-features

      - name: Check locked dependencies
        run: cargo check --locked

  clippy:
    name: Clippy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: clippy

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Nextest and Doc Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Test
        run: cargo nextest run --all-features --test-threads=1

      - name: Cargo test compatibility
        run: cargo test --all-features -- --test-threads=1

      - name: Test locked dependencies
        run: cargo test --locked -- --test-threads=1

      - name: Doc tests
        run: cargo test --doc

  docs:
    name: Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Documentation
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit dependencies
        run: cargo audit

  smoke:
    name: Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Smoke test
        run: scripts/smoke.sh

  ci:
    name: CI
    runs-on: ubuntu-latest
    needs:
      - format-and-duplication
      - check
      - clippy
      - test
      - docs
      - audit
      - smoke
      - web
    if: ${{ always() }}

    steps:
      - name: Verify required checks
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}" == "true" ]]; then
            echo "One or more required CI jobs did not pass."
            exit 1
          fi
          echo "All required CI jobs passed."
