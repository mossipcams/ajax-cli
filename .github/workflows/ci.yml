name: CI

"on":
  pull_request:
  merge_group:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  pr-title:
    name: PR Title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Validate PR title
        if: github.event_name == 'pull_request'
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Types that release-please changelog-sections recognize, plus chore
          # for release-please PRs (pull-request-title-pattern).
          types: |
            feat
            fix
            perf
            refactor
            revert
            chore
      - name: Skip on non-PR events
        if: github.event_name != 'pull_request'
        run: echo "PR title check not applicable for ${{ github.event_name }}."

  release-pr-bypass:
    name: Release PR Bypass
    runs-on: ubuntu-latest
    outputs:
      skip-ci: ${{ steps.classify.outputs.skip-ci }}

    steps:
      - name: Classify Release Please PR
        id: classify
        run: |
          if [[ "${{ github.event_name == 'pull_request' && startsWith(github.head_ref, 'release-please--branches--main') }}" == "true" ]]; then
            echo "skip-ci=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip-ci=false" >> "$GITHUB_OUTPUT"
          fi

  format:
    name: Format
    runs-on: ubuntu-latest
    needs: [pr-title, release-pr-bypass]
    if: ${{ needs.release-pr-bypass.outputs.skip-ci != 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci

      - name: Check formatting
        run: cargo fmt --check

  web:
    name: Web
    runs-on: ubuntu-latest
    needs: [pr-title, release-pr-bypass]
    if: ${{ needs.release-pr-bypass.outputs.skip-ci != 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Lint
        run: npm run web:lint

      - name: Install Playwright browsers
        run: npx playwright install --with-deps webkit

      - name: Smoke and visual-regression tests
        run: npm run web:smoke -- --project=mobile-webkit

  check:
    name: Cargo Check
    runs-on: ubuntu-latest
    needs: [pr-title, release-pr-bypass]
    if: ${{ needs.release-pr-bypass.outputs.skip-ci != 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci

      - name: Check all targets
        run: cargo check --locked --all-targets --all-features
        env:
          RUSTFLAGS: -D warnings

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: [pr-title, release-pr-bypass]
    if: ${{ needs.release-pr-bypass.outputs.skip-ci != 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Nextest and Doc Tests
    runs-on: ubuntu-latest
    needs: [pr-title, release-pr-bypass]
    if: ${{ needs.release-pr-bypass.outputs.skip-ci != 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Test
        run: cargo nextest run --all-features --test-threads=1

      - name: Doc tests
        run: cargo test --doc

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    needs: [pr-title, release-pr-bypass]
    if: ${{ needs.release-pr-bypass.outputs.skip-ci != 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci

      - name: Documentation
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    needs: [pr-title, release-pr-bypass]
    if: ${{ needs.release-pr-bypass.outputs.skip-ci != 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Audit dependencies
        run: cargo audit

  ci:
    name: CI
    runs-on: ubuntu-latest
    needs:
      - pr-title
      - release-pr-bypass
      - format
      - check
      - clippy
      - test
      - docs
      - audit
      - web
    if: ${{ always() }}

    steps:
      - name: Verify required checks
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required CI jobs did not pass."
            exit 1
          fi

          if [[ "${{ needs.release-pr-bypass.outputs.skip-ci == 'true' }}" == "true" ]]; then
            echo "CI intentionally bypassed for Release Please PR."
            exit 0
          fi

          if [[ "${{ contains(needs.*.result, 'skipped') }}" == "true" ]]; then
            echo "One or more required CI jobs did not pass."
            exit 1
          fi

          echo "All required CI jobs passed."
